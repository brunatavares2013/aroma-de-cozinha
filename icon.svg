<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo marrom com bordas arredondadas -->
  <rect width="512" height="512" rx="90" ry="90" fill="#6B3A2A"/>

  <!-- Ramo de folha (canto inferior esquerdo) -->
  <g transform="translate(68, 310) rotate(-30)">
    <path d="M0 0 Q8 -18 0 -36" stroke="#6A7D4A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M0 -8 Q-14 -18 -8 -32" stroke="#6A7D4A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="-11" cy="-22" rx="9" ry="5" fill="#6A7D4A" transform="rotate(-40 -11 -22)"/>
    <path d="M0 -18 Q14 -24 10 -36" stroke="#6A7D4A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="12" cy="-28" rx="9" ry="5" fill="#6A7D4A" transform="rotate(30 12 -28)"/>
    <path d="M0 -28 Q-10 -36 -4 -48" stroke="#6A7D4A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="-7" cy="-40" rx="7" ry="4" fill="#6A7D4A" transform="rotate(-35 -7 -40)"/>
  </g>
  <g transform="translate(88, 350) rotate(-15)">
    <path d="M0 0 Q6 -14 0 -28" stroke="#6A7D4A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="-8" cy="-14" rx="8" ry="4.5" fill="#6A7D4A" transform="rotate(-40 -8 -14)"/>
    <ellipse cx="9" cy="-20" rx="8" ry="4.5" fill="#6A7D4A" transform="rotate(30 9 -20)"/>
  </g>

  <!-- Vapor (3 ondas) -->
  <path d="M196 130 Q202 112 196 94 Q190 112 196 130" stroke="#C9A26D" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M256 124 Q262 104 256 84 Q250 104 256 124" stroke="#C9A26D" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M316 130 Q322 112 316 94 Q310 112 316 130" stroke="#C9A26D" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Corpo da xícara -->
  <path d="M152 160 Q148 300 256 312 Q364 300 360 160 Z" fill="#F5ECD7"/>

  <!-- Borda superior da xícara (elipse) -->
  <ellipse cx="256" cy="160" rx="104" ry="18" fill="#C9A26D"/>

  <!-- Alça -->
  <path d="M360 196 Q416 196 416 240 Q416 284 360 284" stroke="#F5ECD7" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M360 196 Q400 196 400 240 Q400 284 360 284" stroke="#6B3A2A" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Pires -->
  <ellipse cx="256" cy="334" rx="148" ry="22" fill="#C9A26D"/>
  <ellipse cx="256" cy="332" rx="124" ry="12" fill="#F5ECD7"/>
</svg>
